services:
  # ── Django API (gunicorn) ──────────────────────────────────────────────────
  - type: web
    name: playto-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn playto.wsgi --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://playto-frontend.onrender.com,https://playto-frontend-q8w0.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: playto-redis
          property: connectionString

  # ── React / Vite static site ──────────────────────────────────────────────
  - type: web
    name: playto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: "https://playto-backend-q8w0.onrender.com/api/v1"

  # ── Redis (Key Value) ─────────────────────────────────────────────────────
  - type: redis
    name: playto-redis
    plan: free
    ipAllowList: []

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: playto-db
    databaseName: playto
    plan: free
